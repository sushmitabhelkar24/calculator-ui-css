<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <link rel="stylesheet" href="./style.css"/>
</head>
<body>

    <h1>Calculator</h1>



      <div class="calculater-head-container">
               <div class="head-section">
                     <div>Casio</div>
                     <div></div>
                     <div>
                        <div>
                          <div>MJ-120D </div>
                          <div style="color: rgb(16, 216, 16);"><span style="font-size: 18px;font-weight: 700;">IZ</span>
                            <span style="display: block;font-size: 12px;">POWER</span></div>
                          </div>
                          <div>
                          <div>TWO WAY POWER</div>
                        </div>
                     </div>
               </div>

               <div class="input"></div>
               </div> 

    <div class="bg-calculator">


              


               <div class="calculator-container">
               <div class="calculator-parts">
                   <div class="digit">DISP</div>
                   <div class="digit">TAX+</div>
                   <div class="digit">+/-</div>
                   <div class="digit effect">C</div>
                   <div class="digit effect">AC</div>
                   <div class="digit">0</div>
               </div>
                <div class="calculator-parts">
                   <div class="digit adjust">GO TO</div>
                   <div class="digit">TAX-</div>
                   <div class="digit">7</div>
                   <div class="digit">4</div>
                   <div class="digit">1</div>
                   <div class="digit">00</div>
               </div>
                <div class="calculator-parts">
                   <div class="digit adjust">Auto Review</div>
                   <div class="digit">%</div>
                   <div class="digit">8</div>
                   <div class="digit">5</div>
                   <div class="digit">2</div>
                   <div class="digit">.</div>
               </div>
                <div class="calculator-parts">
                   <div class="digit adjust">CORRECT</div>
                   <div class="digit">√</div>
                   <div class="digit">9</div>
                   <div class="digit">6</div>
                   <div class="digit">3</div>
                   <div class="digit">=</div>
               </div>
                <div class="calculator-parts">
                   <div class="digit">▲</div>
                   <div class="digit">►</div>
                   <div class="digit">×</div>
                   <div class="digit">-</div>
                   <div class="plus">+</div>
               </div>
                <div class="calculator-parts">
                   <div class="digit">▼</div>
                   <div class="digit">MU</div>
                   <div class="digit">÷</div>
                   <div class="digit">MRC</div>
                   <div class="digit">M-</div>
                   <div class="digit">M+</div>
               </div>
               </div>
    </div>
</body>
</html>
